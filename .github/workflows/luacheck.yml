name: luacheck

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  luacheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install luacheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq lua5.4 luarocks
          sudo luarocks install luacheck

      - name: Run luacheck
        run: |
          set +e
          luacheck . --formatter plain | tee result.txt
          code=${PIPESTATUS[0]}
          echo "luacheck exit code: $code"
          while IFS= read -r line; do
            [ -n "$line" ] && echo "::error::$line"
          done < result.txt
          exit $code
