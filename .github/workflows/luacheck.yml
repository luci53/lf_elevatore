name: luacheck

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  luacheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run luacheck
        uses: lunarmodules/luacheck@v1
        with:
          args: . --formatter plain
